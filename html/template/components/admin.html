{% macro review(name, title, Aname, description, review, review_id=None) %}

<div class="container-fluid d-flex align-items-center justify-content-center py-3">
    <div class="row w-100 justify-content-center">
        <div class="list-container col-11 col-md-11 bg-grey rounded-4">
            <div class="d-flex justify-content-between align-items-center">

                <div class="d-flex align-items-baseline gap-3 mb-1">
                    <h1 class="fw-bold mb-0">{{title}}</h1>
                    <h4 class="fw-bold ms-3 mb-0">by {{Aname}}:</h4>
                </div>

    
            </div>

                <div class="d-flex align-items-center gap-3">
                    <h2 class="review mb-0">{{review}}</h2>

                    {% if review_id %}
                    <div class="btn p-0 ms-auto">
                        <a href="{{ url_for('dismiss_reports', review_id=review_id) }}">
                            <img class="ms-auto" src="{{ url_for('static', filename='images/tickIcon.png') }}"
                                alt="Approve Review IMG" height="45" width="50">
                        </a>
                    </div>

                    <div class="btn p-0">
                        <form action="{{ url_for('delete_reported_review', review_id=review_id) }}" method="POST">
                            <button type="submit" style="background: none; border: none; padding: 0;">
                                <img class="reviewIMG"
                                    src="{{ url_for('static', filename='images/unhoveredDeleteIcon.png') }}"
                                    alt="Delete Review IMG" height="50" width="40">
                            </button>
                        </form>
                    </div>
                    {% else %}
                    <div class="btn p-0 ms-auto">
                        <img class="ms-auto" src="{{ url_for('static', filename='images/tickIcon.png') }}"
                            alt="Approve Review IMG" height="45" width="50">
                    </div>

                    <div class="btn p-0">
                        <img class="reviewIMG" src="{{ url_for('static', filename='images/unhoveredDeleteIcon.png') }}"
                            alt="Delete Review IMG" height="50" width="40">
                    </div>
                    {% endif %}

                    <p class="lead float-start">
                        {{description}}
                    </p>

                </div>

            </div>
        </div>
    </div>
</div>

{% endmacro %}

{% macro movie(name, title, description, review) %}

<div class="btn container-fluid d-flex align-items-center justify-content-center py-3">
    <div class="row w-100 justify-content-center">
        <div class="list-container col-11 col-md-11 bg-grey rounded-4">
            <div class="d-flex justify-content-between align-items-center">

                <div class="flex-grow-1">
                    <div class="d-flex align-items-baseline gap-3 mb-1">
                        <h1 class="reviewTitle fw-bold mb-0">{{title}}</h1>
                    </div>

                    <p class="lead">
                        {{description}}
                    </p>
                </div>

                <div class="d-flex w-25 align-items-center gap-3">
                    <h2 class="review mb-0 ms-auto me-3">{{review}}</h2>
                </div>

            </div>
        </div>
    </div>
</div>
{% endmacro %}
