{% macro movieCard(src ="",MovieName ="") %}
    
<div class="card movieCard">
    <img class="card-img" src="{{ url_for('static', filename='images/moviePlaceholder.png') }}" alt="{{MovieName}}" />
    <div class="card-body  movieTitle">
        <h4 class="card-title">{{MovieName}}</h4>
    </div>
</div>
{% endmacro %}
