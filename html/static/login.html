<!DOCTYPE html>
<html>

<head>
	<title>Login Page</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<div class="container-fluid overflow-hidden">
		<div class="row justify-content-center mb-4">
			<div class="col-md-8 d-flex">
				<input type="text" placeholder="Enter Username" class="form-control text-center d-flex">
			</div>
		</div>


		<div class="row justify-content-center mb-4">
			<div class="col-md-8 d-flex">
				<input type="password" placeholder="Enter Password" class="form-control text-center">
			</div>
		</div>

		<div class="row justify-content-center">
			<div class="col-md-4 d-flex">
				<button type="button" class="btn big_button w-100" name="login"
					onclick="window.location.href='index.html'">
					Login </button>
			</div>
		</div>

	</div>
	<!-- Bootstrap JavaScript Libraries -->
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
		integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
		crossorigin="anonymous"></script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
		integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
		crossorigin="anonymous"></script>

</body>


</html>
