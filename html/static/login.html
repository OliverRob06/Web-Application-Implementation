<!DOCTYPE html>
<html>

<head>
	<title>Login Page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<div class="container">
		<div class="row justify-content-center mb-5">
			<div class="col-md-10 col-lg-4">
				<input type="text" placeholder="Enter Username" class="form-control text-center w-100">
			</div>
		</div>

		<div class="row justify-content-center mb-5">
			<div class="col-md-10 col-lg-4">
				<input type="password" placeholder="Enter Password" class="form-control text-center w-100">
			</div>
		</div>

		<div class="row justify-content-center text">
			<div class="col-md-8 col-lg-2">
				<button type="button" name="login" onclick="window.location.href='index.html'" class="big_button w-100">
					Login
				</button>
			</div>

		</div>

	</div>
</body>


</html>
